<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform - Provisioning</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Identity Portal</h1>
                <p class="subtitle">Account Provisioning</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="email">System Email</label>
                    <input type="email" id="email" name="email" placeholder="user@domain.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Passphrase</label>
                    <input type="password" id="password" name="password" required>
                    <div class="password-toggle" onclick="togglePassword('password')">👁️</div>
                    <div class="password-strength" id="passwordStrength"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Verify Passphrase</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <div class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</div>
                </div>

                <div class="form-group">
                    <label for="role">Access Level</label>
                    <select id="role" name="role">
                        <option value="ANALYST">Standard (Analyst)</option>
                        <option value="MANAGER">Elevated (Manager)</option>
                        <option value="ADMIN">System (Administrator)</option>
                    </select>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <button type="submit" class="btn btn-primary" id="registerBtn">Provision Account</button>

                <div class="form-footer">
                    <a href="index.html" class="link">Return to Authentication</a>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const passwordInput = document.getElementById('password');

        passwordInput.addEventListener('input', () => {
            checkPasswordStrength(passwordInput.value);
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const registerBtn = document.getElementById('registerBtn');
            
            clearMessages();

            if (password !== confirmPassword) {
                showError('Passphrase verification failed.');
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Processing...';
            
            try {
                await register(email, password, role);
                showSuccess('Provisioning successful. Routing to login...');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (error) {
                showError(error.message || 'Provisioning sequence failed.');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Provision Account';
            }
        });

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        function checkPasswordStrength(password) {
            const strengthDiv = document.getElementById('passwordStrength');
            if (!password) {
                strengthDiv.style.display = 'none';
                return;
            }
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;

            const colors = ['#cf6679', '#ffb74d', '#81c784', '#4caf50'];
            const labels = ['Weak', 'Fair', 'Good', 'Optimal'];
            
            const level = Math.min(strength, 3);
            strengthDiv.textContent = labels[level];
            strengthDiv.style.color = colors[level];
            strengthDiv.style.display = 'block';
        }

        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
    </script>
</body>
</html>
