<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform - Reset Passphrase</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Identity Portal</h1>
                <p class="subtitle">Set New Passphrase</p>
            </div>

            <form id="resetPasswordForm" class="auth-form">
                <div class="form-group">
                    <label for="token">Recovery Token</label>
                    <input type="text" id="token" name="token" placeholder="Enter the 6-digit or secure token" required>
                </div>

                <div class="form-group">
                    <label for="newPassword">New Passphrase</label>
                    <input type="password" id="newPassword" name="newPassword" required>
                    <div class="password-toggle" onclick="togglePassword('newPassword')">👁️</div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Verify Passphrase</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <div class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</div>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <button type="submit" class="btn btn-primary" id="resetBtn">Commit Changes</button>

                <div class="form-footer">
                    <a href="index.html" class="link">Return to Authentication</a>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetBtn = document.getElementById('resetBtn');
            
            clearMessages();

            if (newPassword !== confirmPassword) {
                showError('Passphrases do not match.');
                return;
            }
            
            resetBtn.disabled = true;
            resetBtn.textContent = 'Processing...';
            
            try {
                // Apelează funcția din api.js
                await resetPassword(token, newPassword);
                
                showSuccess('Passphrase updated successfully. Routing to login...');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (error) {
                // Afișează eroarea exact așa cum o dă backend-ul
                showError(error.message || 'Failed to reset passphrase.');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Commit Changes';
            }
        });

        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            field.type = field.type === 'password' ? 'text' : 'password';
        }

        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            showToast(message, 'error');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            showToast(message, 'success');
        }
    </script>
</body>
</html>
