<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform - Password Recovery</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Identity Portal</h1>
                <p class="subtitle">Access Recovery</p>
            </div>

            <form id="forgotPasswordForm" class="auth-form">
                <p style="margin-bottom: 20px; font-size: 0.9em; color: var(--text-muted);">
                    Enter your system email address. If an account matches, we will dispatch a recovery link.
                </p>

                <div class="form-group">
                    <label for="email">System Email</label>
                    <input type="email" id="email" name="email" placeholder="user@domain.com" required>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <button type="submit" class="btn btn-primary" id="resetBtn">Dispatch Recovery Link</button>

                <div class="form-footer">
                    <a href="index.html" class="link">Return to Authentication</a>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const resetBtn = document.getElementById('resetBtn');
            
            clearMessages();
            resetBtn.disabled = true;
            resetBtn.textContent = 'Processing...';
            
            try {
                // This calls the forgotPassword function from api.js
                const response = await forgotPassword(email);
                
                // Show the generic security message returned by the API
                showSuccess(response.message || 'If the email exists, a password reset link has been sent.');
                
                // Clear the input
                document.getElementById('email').value = '';
            } catch (error) {
                // In v1 (vulnerable) this might leak user existence
                // In v2 (secure) it should theoretically never hit this block if the API always returns 200 generic message
                showError(error.message || 'Failed to process request.');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Dispatch Recovery Link';
            }
        });

        function clearMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            showToast(message, 'error');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            showToast(message, 'success');
        }

        // Use the existing toast function from api.js if available, otherwise fallback
        if (typeof showToast !== 'function') {
            window.showToast = function(message, type = 'info') {
                const toast = document.getElementById('toast');
                if (!toast) return;
                toast.textContent = message;
                toast.className = `toast ${type} show`;
                setTimeout(() => toast.classList.remove('show'), 3000);
            };
        }
    </script>
</body>
</html>
